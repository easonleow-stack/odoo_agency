[options]
; ─────────────────────────────────────────────────────────────────
;  Odoo 18 Configuration — Ads On Marketing
; ─────────────────────────────────────────────────────────────────

; Database
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo_local_password

; Paths
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; Performance
# workers = 2               ; Increase to 4+ on a 4-core server
# max_cron_threads = 1
# limit_memory_hard = 2684354560   ; 2.5 GB
# limit_memory_soft = 2147483648   ; 2 GB
# limit_request = 8192
# limit_time_cpu = 600
# limit_time_real = 1200

; Security
list_db = False           ; Hides the database list page from the public
admin_passwd = admin_passwd

; Logging
log_level = info
# logfile = /var/log/odoo/odoo.log

; Long polling (for live chat, notifications)
longpolling_port = 8072

; Email (update with your SMTP when ready)
; smtp_server = smtp.gmail.com
; smtp_port = 587
; smtp_user = your@email.com
; smtp_password = yourpassword
; smtp_ssl = True
; email_from = your@email.com
