# ─────────────────────────────────────────────────────────────────
#  Nginx config for Odoo 18
#  Handles: HTTP → HTTPS redirect · Odoo proxy · Long-polling
#  Replace YOUR_DOMAIN with your actual domain in 2 places below
# ─────────────────────────────────────────────────────────────────

upstream odoo {
    server odoo:8069;
}

upstream odoo_longpoll {
    server odoo:8072;
}

# ── Redirect HTTP → HTTPS ───────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Main Server ───────────────────────────────────────────
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # SSL Certificate (issued by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # File upload limit (for attachments)
    client_max_body_size 100m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Long-polling (live chat, notifications) ─────────────────
    location /longpolling {
        proxy_pass http://odoo_longpoll;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # ── Main Odoo App ───────────────────────────────────────────
    location / {
        proxy_pass http://odoo;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
        proxy_redirect off;
        proxy_buffering off;
    }

    # ── Static assets — cached aggressively ────────────────────
    location ~* /web/static/ {
        proxy_pass http://odoo;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
